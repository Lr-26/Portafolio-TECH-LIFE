<svg viewBox="0 0 100 100" width="800" height="800" fill="none" xmlns="http://www.w3.org/2000/svg" style="background-color: #05060f;">
  <defs>
    <linearGradient id="tech-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0055ff" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#00f2ff" />
    </linearGradient>
    <filter id="life-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- TECH: The Silicon Microchip Frame -->
  <!-- Outer subtle glow frame -->
  <path d="M 30,15 L 70,15 L 85,30 L 85,70 L 70,85 L 30,85 L 15,70 L 15,30 Z" stroke="rgba(0, 242, 255, 0.15)" stroke-width="6" stroke-linejoin="miter" />
  <!-- Inner sharp tech frame -->
  <path d="M 30,15 L 70,15 L 85,30 L 85,70 L 70,85 L 30,85 L 15,70 L 15,30 Z" stroke="url(#tech-grad)" stroke-width="3" stroke-dasharray="90 120" stroke-linecap="round" stroke-linejoin="miter" />

  <!-- TECH: External Data Nodes (Pins) -->
  <line x1="50" y1="2" x2="50" y2="15" stroke="url(#tech-grad)" stroke-width="3" stroke-linecap="round" />
  <line x1="50" y1="85" x2="50" y2="98" stroke="url(#tech-grad)" stroke-width="3" stroke-linecap="round" />
  <line x1="2" y1="50" x2="15" y2="50" stroke="url(#tech-grad)" stroke-width="3" stroke-linecap="round" />
  <line x1="85" y1="50" x2="98" y2="50" stroke="url(#tech-grad)" stroke-width="3" stroke-linecap="round" />
  
  <!-- LIFE: The Central Heartbeat/EKG Pulse -->
  <!-- The core EKG line -->
  <path d="M 18,50 L 32,50 L 42,24 L 58,76 L 68,50 L 82,50" stroke="#fff" stroke-width="6" stroke-linejoin="bevel" stroke-linecap="round" filter="url(#life-glow)" />
  
  <!-- LIFE: Pulse Energy Data Spheres -->
  <circle cx="18" cy="50" r="4" fill="#00f2ff" />
  <circle cx="82" cy="50" r="4" fill="#00f2ff" />
  <circle cx="50" cy="50" r="4" fill="#fff" filter="url(#life-glow)" opacity="0.6" />
</svg>
