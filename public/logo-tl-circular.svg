<svg viewBox="0 0 100 100" width="800" height="800" fill="none" xmlns="http://www.w3.org/2000/svg" style="background-color: #05060f;">
  <defs>
    <linearGradient id="tl-cyan" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#2dd4bf" />
    </linearGradient>
  </defs>

  <!-- Abstract Base Aura -->
  <circle cx="50" cy="50" r="35" fill="#2dd4bf" style="filter: blur(18px); opacity: 0.15" />

  <!-- THE CIRCLE BOUNDARY (BADGE) -->
  <circle cx="50" cy="50" r="46" stroke="rgba(255,255,255,0.08)" stroke-width="6" />
  <path d="M 50,4 A 46,46 0 0,1 96,50" stroke="url(#tl-cyan)" stroke-width="6" stroke-linecap="round" />

  <!-- THE INTERLOCKING GEOMETRIC TL MONOGRAM (SCALED DOWN) -->
  <g transform="translate(15, 15) scale(0.7)">
    <!-- 1. The L Frame (Gradient) -->
    <path d="M 25,25 L 25,70 A 10,10 0 0,0 35,80 L 75,80" stroke="url(#tl-cyan)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- 2. The T Core (Crisp White) -->
    <path d="M 45,25 L 75,25" stroke="#ffffff" stroke-width="16" stroke-linecap="round" />
    <path d="M 60,25 L 60,60" stroke="#ffffff" stroke-width="16" stroke-linecap="round" />
  </g>
</svg>
