<svg viewBox="0 0 100 100" width="800" height="800" fill="none" xmlns="http://www.w3.org/2000/svg" style="background-color: #05060f;">
  <defs>
    <linearGradient id="real-cyan" x1="0" y1="100" x2="100" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0284c7" />
      <stop offset="50%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#2dd4bf" />
    </linearGradient>
    <linearGradient id="real-silver" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="45%" stop-color="#f8fafc" />
      <stop offset="55%" stop-color="#cbd5e1" />
      <stop offset="100%" stop-color="#ffffff" />
    </linearGradient>
    <linearGradient id="glint" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="rgba(255,255,255,0.8)" />
      <stop offset="30%" stop-color="rgba(255,255,255,0.0)" />
    </linearGradient>
    <filter id="shadow-3d" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.6" />
    </filter>
    <filter id="neon" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- BACKGROUND DEPTH & AURA -->
  <circle cx="50" cy="50" r="35" fill="#2dd4bf" style="filter: blur(18px); opacity: 0.15" />
  <circle cx="50" cy="50" r="42" fill="#050814" stroke="#1e293b" stroke-width="1" filter="url(#shadow-3d)" />

  <!-- THE OUTER RING (3D Chrome / Neon) -->
  <circle cx="50" cy="50" r="46" stroke="rgba(255,255,255,0.06)" stroke-width="6" filter="url(#shadow-3d)" />
  <path d="M 50,4 A 46,46 0 0,1 96,50" stroke="url(#real-cyan)" stroke-width="4" stroke-linecap="round" filter="url(#neon)" />

  <!-- THE 3D INTERLOCKING MONOGRAM -->
  <g transform="translate(15, 15) scale(0.7)">
    
    <!-- L SHAPE -->
    <!-- Base 3D Volumetric layer -->
    <path d="M 25,25 L 25,70 A 10,10 0 0,0 35,80 L 75,80" stroke="url(#real-cyan)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow-3d)" />
    <!-- Lighting Glint Overlay -->
    <path d="M 25,25 L 25,70 A 10,10 0 0,0 35,80 L 75,80" stroke="url(#glint)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Micro-bevel edge highlight -->
    <path d="M 25,25 L 25,70 A 10,10 0 0,0 35,80 L 75,80" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="30 150" />

    <!-- T SHAPE (Combined paths to fix bounding box gradient error) -->
    <!-- Base 3D Metallic layer -->
    <path d="M 45,25 L 75,25 M 60,25 L 60,60" stroke="url(#real-silver)" stroke-width="16" stroke-linecap="round" filter="url(#shadow-3d)" />
    <!-- Lighting Glint Overlay -->
    <path d="M 45,25 L 75,25 M 60,25 L 60,60" stroke="url(#glint)" stroke-width="16" stroke-linecap="round" />
  </g>
</svg>
