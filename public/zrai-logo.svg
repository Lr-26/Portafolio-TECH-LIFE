<svg width="200" height="80" viewBox="0 0 200 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="chromeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="50%" stop-color="#94A3B8" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F2FF" />
      <stop offset="100%" stop-color="#AC52FF" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- ZR Icon Group -->
  <g transform="translate(10, 10)">
    <!-- Letter Z -->
    <path d="M0 0 H40 L15 35 H40" stroke="url(#chromeGradient)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Connection Line -->
    <path d="M40 35 H55" stroke="url(#chromeGradient)" stroke-width="4" stroke-linecap="round" />
    
    <!-- Letter R -->
    <path d="M55 0 V40 M55 0 H80 C90 0 95 10 95 20 C95 30 90 40 80 40 H55 M75 20 L95 40" stroke="url(#chromeGradient)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Neural Grid inside Z -->
    <g transform="translate(15, 10)">
      <circle cx="5" cy="5" r="1.5" fill="#00F2FF" filter="url(#glow)" />
      <circle cx="20" cy="5" r="1.5" fill="#00F2FF" filter="url(#glow)" />
      <circle cx="12.5" cy="15" r="1.5" fill="#AC52FF" filter="url(#glow)" />
      <circle cx="5" cy="25" r="1.5" fill="#00F2FF" filter="url(#glow)" />
      <circle cx="20" cy="25" r="1.5" fill="#00F2FF" filter="url(#glow)" />
      
      <line x1="5" y1="5" x2="20" y2="5" stroke="#00F2FF" stroke-width="0.5" opacity="0.5" />
      <line x1="5" y1="5" x2="12.5" y2="15" stroke="#00F2FF" stroke-width="0.5" opacity="0.5" />
      <line x1="20" y1="5" x2="12.5" y2="15" stroke="#00F2FF" stroke-width="0.5" opacity="0.5" />
      <line x1="5" y1="25" x2="12.5" y2="15" stroke="#AC52FF" stroke-width="0.5" opacity="0.5" />
      <line x1="20" y1="25" x2="12.5" y2="15" stroke="#AC52FF" stroke-width="0.5" opacity="0.5" />
      <line x1="5" y1="25" x2="20" y2="25" stroke="#00F2FF" stroke-width="0.5" opacity="0.5" />
    </g>
  </g>

  <!-- Text -->
  <text x="5" y="70" font-family="Inter, sans-serif" font-weight="800" font-size="20" letter-spacing="2" fill="url(#textGradient)" style="filter: drop-shadow(0px 0px 4px rgba(0, 242, 255, 0.3));">Z-RAI SOFTWARE AI</text>
</svg>
